name: CSA Env-Based Test Execution

on:
  workflow_dispatch:
    inputs:
      env:
        type: choice
        default: prod
        options: [stage, prod]
      browser:
        type: choice
        default: chrome-headless
        options: [chrome-headless, chrome, edge, firefox]

  schedule:
    # ⏰ Runs every day at 2:00 AM UTC
    #- cron: "0 2 * * *"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔹 Setup Java
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # ✅ FIX 1: Install stable pinned Chrome + matching ChromeDriver
      - name: Setup Chrome Browser
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # ✅ FIX 2: Install ChromeDriver matching installed Chrome version
      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      # ✅ FIX 3: Verify Chrome and ChromeDriver versions match
      - name: Verify Chrome & ChromeDriver versions
        run: |
          echo "Chrome version:"
          google-chrome --version
          echo "ChromeDriver version:"
          chromedriver --version

      # ✅ FIX 4: Set DISPLAY for virtual framebuffer (helps headless rendering)
      - name: Start Xvfb virtual display
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      # 🔹 Run Tests
      - name: Run Regression Suite
        env:
          CI: true
          DISPLAY: :99
          # ✅ FIX 5: Pass env/browser with fallback defaults for scheduled runs
          ENV_NAME: ${{ github.event.inputs.env || 'prod' }}
          BROWSER_NAME: ${{ github.event.inputs.browser || 'chrome-headless' }}
        run: |
          mvn clean test \
            -Denv=${ENV_NAME} \
            -Dbrowser=${BROWSER_NAME} \
            -Dsurefire.useFile=false \
            -Dmaven.test.failure.ignore=true
        continue-on-error: true

      # 🔹 Upload raw test reports
      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      # 🔹 Upload Allure results
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/

      # 🔹 Install Allure CLI
      - name: Install Allure
        if: always()
        run: |
          wget -q -O allure-2.21.0.tgz \
            https://github.com/allure-framework/allure2/releases/download/2.21.0/allure-2.21.0.tgz
          tar -xzf allure-2.21.0.tgz
          sudo mv allure-2.21.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # 🔹 Generate Allure HTML report
      - name: Generate Allure Report
        if: always()
        run: |
          allure generate target/allure-results --clean -o allure-report

      # 🔹 Deploy to GitHub Pages
      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

      # 🔹 Show results inside GitHub Actions UI
      - name: Add Test Summary
        if: always()
        run: |
          echo "## 🚀 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "- 🌍 Environment: ${{ github.event.inputs.env || 'prod' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 Browser: ${{ github.event.inputs.browser || 'chrome-headless' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 [View Allure Report](https://santoshadupa1.github.io/csagroupstore/)" >> $GITHUB_STEP_SUMMARY

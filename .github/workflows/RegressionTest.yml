name: CSA Env-Based Test Execution

on:
  workflow_dispatch:
    inputs:
      env:
        type: choice
        description: "Environment (stage / prod)"
        required: false
        default: stage
        options:
          - stage
          - prod
      browser:
        type: choice
        description: "Browser to run tests"
        required: true
        default: chrome
        options:
          - chrome
          - edge
          - firefox

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Verify Java Version
        run: java -version

      - name: Run TestNG Suite (Env Driven)
        run: |
          mvn clean test -DsuiteXmlFile=RegressionSuite.xml \
          -Denv=${{ github.event.inputs.env || 'stage' }} \
          -Dbrowser=${{ github.event.inputs.browser || 'chrome' }}

      # 🧱 Generate Allure HTML Report
      - name: Generate Allure Report
        run: |
          allure generate target/allure-results --clean -o target/allure-report
          cp -r target/allure-report/history history || true

      # 📦 Upload Allure Report as artifact
      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report

      # 🚀 Deploy Allure Report to GitHub Pages
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./target/allure-report
          keep_files: true
          force_orphan: true

      # 📊 Upload raw test results
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/test-results/*.xml

      - name: Publish Test Results Summary
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/test-results/*.xml
          check_run: false
          job_summary: true

      - name: Add Allure Report URL to Summary
        run: echo "🌐 [View Allure Report](https://santoshadupa1.github.io/csagroupstore/)" >> $GITHUB_STEP_SUMMARY

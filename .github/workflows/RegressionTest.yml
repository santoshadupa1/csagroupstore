name: CSA Env-Based Test Execution

on:
  # Manual trigger with environment selection
  workflow_dispatch:
    inputs:
      env:
        description: "Environment (stage / prod)"
        required: true
        default: "stage"
      browser:
        description: "Browser (chrome / firefox / edge)"
        required: true
        default: "chrome"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: maven

    - name: Verify Java Version
      run: java -version

    - name: Run TestNG Suite (Env Driven)
      run: |
        mvn clean test -DsuiteXmlFile=RegressionSuite.xml -Denv=${{ github.event.inputs.env || 'stage' }} -Dbrowser=${{ github.event.inputs.browser || 'chrome' }}

    - name: Upload TestNG Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: TestNG-Reports
        path: |
          target/surefire-reports/
          test-output/

    - name: Execution Summary
      if: always()
      run: |
        echo "Execution completed for ENV=${{ github.event.inputs.env || 'stage' }}"

name: CSA Env-Based Test Execution

on:
  workflow_dispatch:
    inputs:
      env:
        type: choice
        default: stage
        options: [stage, prod]
      browser:
        type: choice
        default: chrome-headless
        options: [chrome-headless, chrome, edge, firefox]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup Java 21
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # 3️⃣ Install Allure CLI
      - name: Install Allure
        run: |
          wget -q -O allure-2.27.0.tgz https://github.com/allure-framework/allure2/releases/latest/download/allure-2.27.0.tgz
          tar -xzf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # 4️⃣ Restore Allure History
      - name: Restore Allure History
        run: |
          git fetch origin gh-pages || true
          mkdir -p target/allure-results/history
          if git show origin/gh-pages:history >/dev/null 2>&1; then
            git show origin/gh-pages:history | tar -xO || true
          fi

      # 5️⃣ Run Maven Regression Suite
      - name: Run Regression Suite
        run: |
          mvn clean test \
          -Denv=${{ github.event.inputs.env || 'stage' }} \
          -Dbrowser=${{ github.event.inputs.browser || 'chrome-headless' }}

      # 6️⃣ Preserve Allure History
      - name: Preserve Allure History
        run: |
          if [ -d "history" ]; then
            cp -r history target/allure-results/history
          fi

      # 7️⃣ Generate Allure Report
      - name: Generate Allure Report
        run: |
          allure generate target/allure-results --clean -o target/allure-report

      # 8️⃣ Upload Allure Report artifact (optional)
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report

    # 9️⃣  Deploy Allure Report to GitHub Pages
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./target/allure-report
          keep_files: true  # preserve history
          force_orphan: true

      # 🔟 Add Allure Report Link to GitHub Actions Summary
      - name: Add Allure Report URL to Summary
        run: |
          echo "🌐 [View Allure Report](https://santoshadupa1.github.io/csagroupstore/)" >> $GITHUB_STEP_SUMMARY

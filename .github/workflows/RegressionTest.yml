name: CSA Env-Based Test Execution

on:
  workflow_dispatch:
    inputs:
      env:
        type: choice
        default: stage
        options: [stage, prod]
      browser:
        type: choice
        default: chrome
        options: [chrome, edge, firefox]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install Allure CLI
        run: |
          wget https://github.com/allure-framework/allure2/releases/latest/download/allure-2.27.0.tgz
          tar -zxvf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Run Regression Suite
        run: |
          mvn clean test \
          -Denv=${{ github.event.inputs.env || 'stage' }} \
          -Dbrowser=${{ github.event.inputs.browser || 'chrome' }}

      - name: Preserve Allure History
        run: |
          if [ -d "history" ]; then
            cp -r history target/allure-results/history
          fi

      - name: Generate Allure Report
        run: |
          allure generate target/allure-results --clean -o target/allure-report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./target/allure-report
          keep_files: true

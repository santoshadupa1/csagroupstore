name: CSA Env-Based Test Execution

on:
  workflow_dispatch:
    inputs:
      env:
        type: choice
        default: stage
        options: [stage, prod]
      browser:
        type: choice
        default: chrome-headless
        options: [chrome-headless, chrome, edge, firefox]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔹 Setup Java
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # 🔹 Run Tests (allow pipeline to continue even if tests fail)
      - name: Run Regression Suite
        run: |
          mvn clean test \
          -Denv=${{ github.event.inputs.env || 'stage' }} \
          -Dbrowser=${{ github.event.inputs.browser || 'chrome-headless' }}
        continue-on-error: true

      # 🔹 Upload raw test reports (debugging + traceability)
      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      # 🔹 Upload Allure results
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/

      # 🔹 Install Allure CLI
      - name: Install Allure
        run: |
          wget -q -O allure-2.21.0.tgz https://github.com/allure-framework/allure2/releases/download/2.21.0/allure-2.21.0.tgz
          tar -xzf allure-2.21.0.tgz
          sudo mv allure-2.21.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # 🔹 Generate Allure HTML report
      - name: Generate Allure Report
        run: |
          allure generate target/allure-results --clean -o allure-report

      # 🔹 Deploy to GitHub Pages (your repo)
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

      # 🔹 Show results inside GitHub Actions UI
      - name: Add Test Summary
        run: |
          echo "## 🚀 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "- 🌍 Environment: ${{ github.event.inputs.env }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 Browser: ${{ github.event.inputs.browser }}" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 [View Allure Report](https://santoshadupa1.github.io/csagroupstore/)" >> $GITHUB_STEP_SUMMARY
